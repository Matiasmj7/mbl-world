<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBL Arg | La Arena del Kage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.5">
</head>
<body>

    <video autoplay loop muted playsinline class="bg-video">
        <source src="https://raw.githubusercontent.com/Matiasmj7/mbl-world/main/bingo_bg_video.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <header class="main-nav">
        <div class="nav-logo">MBL <span class="accent">ARG</span></div>
        <nav>
            <ul class="menu">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#stream" class="btn-live">En Vivo</a></li>
                <li><a href="#torneos">Torneos</a></li>
                <li><a href="#planes">Planes</a></li>
                <li id="admin-nav" style="display: none;"><a href="#admin" class="btn-admin">Panel Kage</a></li>
            </ul>
        </nav>
        <div class="auth-zone">
            <a href="#modal-login" class="btn-auth" id="user-display">Ingresar</a>
            <div class="user-popover">
                <button onclick="cerrarSesion()" class="btn-exit">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section id="inicio" class="hero-section">
            <h1 class="title-main">DOMINA EL ABISMO</h1>
            <p class="welcome-msg">Bienvenido, <span id="user-greeting">Ninja</span>.</p>
            <div class="hero-actions">
                <a href="#stream" class="btn-primary">VER STREAM</a>
                <a href="#planes" class="btn-secondary">SQUAD TORNEOS</a>
            </div>
        </section>

        <section id="stream" class="section">
            <h2 class="section-head"><i class="fas fa-eye"></i> Visión del Byakugan</h2>
            <div class="container-glass stream-box">
                <div class="stream-grid">
                    <div class="video-container">
                        <iframe id="stream-frame" src="https://player.twitch.tv/?channel=matias_mj7&parent=mbl-world-v2.vercel.app" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="chat-container">
                        <div class="chat-head">Taberna de la Aldea</div>
                        <iframe class="chat-frame" src="https://e.widgetbot.io/channels/299881420891881473/299881420891881473"></iframe>
                    </div>
                </div>
            </div>
        </section>

        <section id="torneos" class="section">
            <h2 class="section-head"><i class="fas fa-khanda"></i> Arena de Combate</h2>
            <div class="torneos-grid" id="lista-torneos">
                </div>
        </section>

        <section id="admin" class="section" style="display: none;">
            <h2 class="section-head"><i class="fas fa-user-shield"></i> Centro de Mando Admin</h2>
            <div class="container-glass">
                <form id="form-torneo" class="admin-form">
                    <input type="text" id="t-nombre" placeholder="Nombre del Torneo" required>
                    <div class="form-row">
                        <input type="text" id="t-fecha" placeholder="Día/Hora" required>
                        <input type="number" id="t-cupos" placeholder="Cupos" required>
                    </div>
                    <input type="text" id="t-premio" placeholder="Premio (Ej: 1000 diamantes)">
                    <select id="t-formato">
                        <option value="1v1">1 vs 1</option>
                        <option value="2v2">2 vs 2</option>
                        <option value="5v5">5 vs 5</option>
                    </select>
                    <button type="submit" class="btn-save">PUBLICAR TORNEO</button>
                </form>
            </div>
        </section>
    </main>

    <div id="modal-login" class="modal">
        <div class="modal-box container-glass">
            <a href="#" class="btn-close"><i class="fas fa-times"></i></a>
            <h3>IDENTIFICACIÓN NINJA</h3>
            <button class="btn-google" id="login-google">
                <i class="fab fa-google"></i> Entrar con Google
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <script src="app.js?v=1.5"></script>
</body>
</html>
