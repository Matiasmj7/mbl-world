<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBL Arg | El Camino del Ninja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <video autoplay loop muted playsinline class="dynamic-bg-video">
        <source src="https://raw.githubusercontent.com/Matiasmj7/mbl-world/main/bingo_bg_video.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header class="navbar">
        <div class="logo">MBL <span class="highlight">ARG</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#stream" class="live-link"><i class="fas fa-circle"></i> En Vivo</a></li>
                <li><a href="#torneos">Torneos</a></li>
                <li><a href="#planes">Planes</a></li>
                <li><a href="#gremio" class="guild-link"><i class="fas fa-users"></i> Gremio</a></li>
                <li id="nav-admin-link" style="display: none;"><a href="#admin" class="admin-link"><i class="fas fa-user-shield"></i> Admin</a></li>
            </ul>
        </nav>
        <div class="user-menu-container">
            <a href="#modal-login" class="btn-login" id="user-btn">Ingresar</a>
            <div class="user-dropdown" id="user-dropdown">
                <button onclick="cerrarSesion()" class="btn-logout">Salir del Sistema</button>
            </div>
        </div>
    </header>

    <main>
        <section id="inicio" class="hero">
            <div class="hero-content">
                <h1 class="shippuden-text">DOMINA EL ABISMO</h1>
                <p>Bienvenido, <span id="hero-user-name">Ninja</span>.</p>
                <div class="cta-buttons">
                    <a href="#stream" class="btn-susanoo">VER TRANSMISIÓN</a>
                    <a href="#planes" class="btn-rasengan">CREAR TORNEOS</a>
                </div>
            </div>
        </section>

        <section id="stream" class="section-container">
            <h2 class="section-title"><i class="fas fa-eye"></i> Visión del Byakugan</h2>
            <div class="stream-container glass-box">
                <div class="stream-layout">
                    <div class="video-column">
                        <div class="video-wrapper">
                            <iframe id="main-stream" src="https://player.twitch.tv/?channel=matias_mj7&parent=mbl-world-v2.vercel.app" frameborder="0" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="discord-wrapper">
                        <div class="discord-header">Chat de la Aldea</div>
                        <iframe class="discord-chat" src="https://e.widgetbot.io/channels/299881420891881473/299881420891881473"></iframe>
                    </div>
                </div>
            </div>
        </section>

        <section id="torneos" class="section-container">
            <h2 class="section-title"><i class="fas fa-khanda"></i> Arena de Combate</h2>
            <div class="torneos-grid" id="contenedor-torneos">
                </div>
        </section>

        <section id="admin" class="section-container" style="display: none;">
            <h2 class="section-title"><i class="fas fa-user-shield"></i> Centro de Mando Hokage</h2>
            <div class="admin-card glass-box">
                <form id="form-crear-torneo">
                    <input type="text" id="admin-torneo-nombre" placeholder="Nombre del Torneo" required>
                    <div class="input-row">
                        <input type="text" id="admin-torneo-fecha" placeholder="Fecha (Ej: 20 Mayo)" required>
                        <input type="number" id="admin-torneo-cupos" placeholder="Cupos" required>
                    </div>
                    <input type="text" id="admin-torneo-premio" placeholder="Premio (Ej: 500 Diamantes)">
                    <select id="admin-torneo-formato">
                        <option value="1v1">Modo 1 VS 1</option>
                        <option value="2v2">Modo 2 VS 2</option>
                        <option value="5v5">Modo 5 VS 5</option>
                    </select>
                    <button type="submit" class="btn-submit-admin">PUBLICAR EN LA ALDEA</button>
                </form>
            </div>
        </section>
    </main>

    <div id="modal-login" class="modal-overlay">
        <div class="modal-content glass-box">
            <a href="#" class="close-modal"><i class="fas fa-times"></i></a>
            <h3>IDENTIFICACIÓN NINJA</h3>
            <button class="btn-google" id="btn-login-google">
                <i class="fab fa-google"></i> Entrar con Google
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <script src="app.js?v=1.1"></script>
</body>
</html>
